<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLineNote - Aplikasi Catatan Suara AI</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="apple-touch-icon" href="assets/logo.png">
    
    <!-- Meta Tags for SEO -->
    <meta name="description" content="BLineNote - Aplikasi catatan suara AI yang memungkinkan Anda merekam, mentranskripsikan, dan mengelola ide dengan mudah">
    <meta name="keywords" content="catatan suara, voice notes, AI transcription, voice to text, note taking">
    <meta name="author" content="BLineNote">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="BLineNote - Aplikasi Catatan Suara AI">
    <meta property="og:description" content="Rekam, transkripsikan, dan kelola ide Anda dengan mudah menggunakan teknologi AI">
    <meta property="og:image" content="assets/logo.png">
    <meta property="og:type" content="website">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Tailwind CSS - Production Build -->
    <link rel="stylesheet" href="./css/styles.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-200">
    <!-- Background Gradient -->
    <div class="fixed inset-0 -z-10 h-full w-full bg-gradient-to-br from-indigo-50 via-white to-sky-100 dark:from-slate-900 dark:via-slate-800 dark:to-indigo-900"></div>

    <!-- Halaman Otentikasi (Tampilan Awal) -->
    <div id="auth-page-container" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass-card rounded-lg shadow-xl p-6 w-full max-w-sm">
            <div class="text-center mb-6">
                <div class="flex justify-center mb-4">
                    <img src="assets/logo.png" alt="BLineNote Logo" class="w-16 h-16 object-contain">
                </div>
                <h1 class="text-3xl font-bold text-slate-900 dark:text-white">BLineNote</h1>
                <p class="text-slate-600 dark:text-slate-400 mt-2">Masuk untuk melanjutkan</p>
            </div>
            <div id="status-div" class="mb-4 text-center text-red-500 text-sm h-5"></div>
            
            <!-- Form Login -->
            <div id="login-section">
                <form id="login-form" class="space-y-4">
                    <div>
                        <label for="email-login" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Email</label>
                        <input type="email" id="email-login" required class="w-full mt-1 p-2 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label for="password-login" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Password</label>
                        <input type="password" id="password-login" required class="w-full mt-1 p-2 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="flex items-center justify-center pt-4">
                        <button type="submit" id="tombol-submit-login" class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 w-full">Masuk</button>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <button id="auth-toggle-btn" class="text-indigo-600 hover:text-indigo-800 text-sm">
                        <span id="auth-toggle-text">Belum punya akun? Daftar di sini</span>
                    </button>
                </div>
                

            </div>
            
            <!-- Form Signup -->
            <div id="signup-section" class="hidden">
                <form id="signup-form" class="space-y-4">
                    <div>
                        <label for="email-daftar" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Email</label>
                        <input type="email" id="email-daftar" required class="w-full mt-1 p-2 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label for="password-daftar" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Password</label>
                        <input type="password" id="password-daftar" required class="w-full mt-1 p-2 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="flex items-center justify-center pt-4">
                        <button type="submit" id="tombol-submit-daftar" class="px-6 py-2 bg-teal-600 text-white rounded-lg hover:bg-teal-700 w-full">Daftar</button>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <button id="auth-toggle-btn-2" class="text-indigo-600 hover:text-indigo-800 text-sm">
                        <span id="auth-toggle-text-2">Sudah punya akun? Masuk di sini</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Konten Aplikasi Utama (Awalnya tersembunyi) -->
    <div id="main-content-container" class="hidden">
        <div class="container mx-auto p-4 sm:p-6 lg:p-8">
            <!-- Header Utama -->
            <header class="flex justify-between items-center mb-10">
                <div class="flex items-center gap-4">
                    <img src="assets/logo.png" alt="BLineNote Logo" class="w-12 h-12 object-contain">
                    <div class="text-left">
                         <h1 class="text-4xl md:text-5xl font-bold text-slate-900 dark:text-white">BLineNote</h1>
                         <p class="text-slate-600 dark:text-slate-400 mt-2">Rekam, transkripsikan, dan kelola ide Anda.</p>
                    </div>
                </div>
                <div id="auth-container">
                     <div id="user-info" class="flex items-center gap-4">
                         <span id="user-email" class="text-sm text-slate-600 dark:text-slate-300 hidden sm:block"></span>
                         <button id="tombol-logout" class="px-4 py-2 bg-slate-500 text-white font-semibold rounded-lg shadow-md hover:bg-slate-600">Keluar</button>
                     </div>
                </div>
            </header>
            
            <!-- Konten Aplikasi -->
            <main id="app-container" class="md:grid md:grid-cols-5 gap-8 pb-20 md:pb-0">
                <!-- Kolom Kiri: Editor (lebih besar) -->
                <div id="editor-view" class="md:col-span-3 flex-col gap-6">
                    <div id="editor-card" class="glass-card rounded-2xl shadow-lg p-6 transition-all relative">
                        <!-- Rich Text Formatting Toolbar -->
                        <div id="formatting-toolbar" class="flex flex-wrap gap-2 mb-4 pb-3 border-b border-slate-200 dark:border-slate-700">
                            <button type="button" onclick="formatCommand('bold')" title="Bold" class="toolbar-btn">
                                <i class="fas fa-bold"></i>
                            </button>
                            <button type="button" onclick="formatCommand('italic')" title="Italic" class="toolbar-btn">
                                <i class="fas fa-italic"></i>
                            </button>
                            <button type="button" onclick="formatCommand('underline')" title="Underline" class="toolbar-btn">
                                <i class="fas fa-underline"></i>
                            </button>
                            <div class="w-px bg-slate-300 dark:bg-slate-600 mx-1"></div>
                            <button type="button" onclick="formatCommand('justifyLeft')" title="Align Left" class="toolbar-btn">
                                <i class="fas fa-align-left"></i>
                            </button>
                            <button type="button" onclick="formatCommand('justifyCenter')" title="Align Center" class="toolbar-btn">
                                <i class="fas fa-align-center"></i>
                            </button>
                            <button type="button" onclick="formatCommand('justifyRight')" title="Align Right" class="toolbar-btn">
                                <i class="fas fa-align-right"></i>
                            </button>
                            <div class="w-px bg-slate-300 dark:bg-slate-600 mx-1"></div>
                            <button type="button" onclick="formatCommand('insertUnorderedList')" title="Bullet List" class="toolbar-btn">
                                <i class="fas fa-list-ul"></i>
                            </button>
                            <button type="button" onclick="formatCommand('insertOrderedList')" title="Numbered List" class="toolbar-btn">
                                <i class="fas fa-list-ol"></i>
                            </button>
                            <button type="button" onclick="window.insertCheckbox()" title="Insert Checkbox" class="toolbar-btn">
                                <i class="fas fa-check-square"></i>
                            </button>
                            <div class="w-px bg-slate-300 dark:bg-slate-600 mx-1"></div>
                            <button type="button" onclick="insertLink()" title="Insert Link" class="toolbar-btn">
                                <i class="fas fa-link"></i>
                            </button>
                            <button type="button" onclick="removeLink()" title="Remove Link" class="toolbar-btn">
                                <i class="fas fa-unlink"></i>
                            </button>
                            <div class="w-px bg-slate-300 dark:bg-slate-600 mx-1"></div>
                            <button type="button" onclick="insertLineBreak()" title="Line Break" class="toolbar-btn">
                                <i class="fas fa-level-down-alt"></i>
                            </button>
                            <button type="button" onclick="formatCommand('removeFormat')" title="Clear Formatting" class="toolbar-btn">
                                <i class="fas fa-remove-format"></i>
                            </button>
                            <div class="w-px bg-slate-300 dark:bg-slate-600 mx-1"></div>
                            <button type="button" id="auto-url-toggle" onclick="toggleAutoURLDetection()" title="Auto URL Detection" class="toolbar-btn auto-url-enabled">
                                <i class="fas fa-magic"></i>
                            </button>
                        </div>
                        
                        <div id="hasil-teks" contenteditable="true" placeholder="Mulai berbicara atau ketik di sini..." class="w-full min-h-[200px] md:min-h-[250px] text-slate-800 dark:text-slate-200 text-lg leading-relaxed focus:outline-none"></div>
                        <div class="mt-4 border-t border-slate-200 dark:border-slate-700 pt-4">
                            <input type="text" id="tag-input" placeholder="Tambahkan label... (misal: Pekerjaan)" class="w-full bg-transparent text-slate-600 dark:text-slate-300 placeholder-slate-400 focus:outline-none">
                        </div>
                    </div>
                    <!-- Tombol Desktop -->
                    <div class="hidden md:flex flex-wrap items-center justify-center gap-3 sm:gap-4 mt-6">
                        <button id="tombol-rekam" class="flex items-center justify-center gap-3 w-auto px-6 py-3 bg-red-600 text-white font-semibold rounded-full shadow-md hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 transition-all duration-300">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.49 6-3.31 6-6.72h-1.7z"></path></svg>
                            <span id="tombol-rekam-teks">Mulai Merekam</span>
                        </button>
                        <button id="tombol-pause" class="hidden flex items-center justify-center gap-3 w-auto px-6 py-3 bg-orange-500 text-white font-semibold rounded-full shadow-md hover:bg-orange-600 focus:outline-none focus:ring-2 focus:ring-orange-400 focus:ring-offset-2 transition-all duration-300">
                            <svg id="pause-icon" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"></path></svg>
                            <svg id="resume-icon" class="hidden w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
                            <span id="tombol-pause-teks">Jeda</span>
                        </button>
                        <button id="tombol-baca-editor" title="Baca Teks di Editor" class="flex items-center justify-center h-12 w-12 bg-teal-500 text-white font-semibold rounded-full shadow-md hover:bg-teal-600 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 transition-all duration-300">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                        </button>
                        <button id="tombol-simpan" class="flex items-center justify-center gap-3 w-auto px-6 py-3 bg-indigo-600 text-white font-semibold rounded-full shadow-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                            <span id="tombol-simpan-teks">Simpan</span>
                        </button>
                        <button id="tombol-batal" class="hidden flex items-center justify-center gap-3 w-auto px-6 py-3 bg-slate-500 text-white font-semibold rounded-full shadow-md hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:ring-offset-2 transition-all duration-300">
                            <span>Batal</span>
                        </button>
                    </div>
                    <div id="status" class="text-center text-sm text-slate-500 dark:text-slate-400 h-5"></div>
                </div>

                <!-- Kolom Kanan: Daftar Catatan -->
                <div id="notes-view" class="md:col-span-2 flex-col gap-6">
                    <div class="relative">
                        <input type="search" id="search-input" placeholder="Cari catatan..." class="w-full pl-10 pr-4 py-2 rounded-full border border-slate-300 dark:border-slate-700 bg-white/50 dark:bg-slate-800/50 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-shadow">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <div id="tag-filters-container" class="flex flex-wrap gap-2"></div>
                    <div class="flex justify-between items-center border-b-2 border-slate-200 dark:border-slate-700 pb-2">
                        <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Daftar Catatan</h2>
                        <button id="tombol-pengaturan" title="Pengaturan" class="p-2 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0 3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </button>
                    </div>
                    <div id="catatan-tersimpan-container" class="space-y-4 max-h-[70vh] overflow-y-auto pr-2"></div>
                </div>
            </main>
        </div>
        
        <!-- Navigasi Mobile & FAB -->
        <div id="mobile-nav" class="md:hidden fixed bottom-0 left-0 right-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm border-t border-slate-200 dark:border-slate-700 flex justify-around items-center h-16 z-40">
            <button id="nav-notes-btn" class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 w-full h-full transition-colors">
                 <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                <span class="text-xs font-medium">Catatan</span>
            </button>
            <button id="tombol-simpan-mobile" class="flex flex-col items-center justify-center text-indigo-600 dark:text-indigo-400 w-full h-full transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                <span id="tombol-simpan-mobile-teks" class="text-xs font-medium">Simpan</span>
            </button>
            <button id="nav-editor-btn" class="flex flex-col items-center justify-center text-indigo-600 dark:text-indigo-400 w-full h-full transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                <span class="text-xs font-medium">Editor</span>
            </button>
        </div>

        <button id="fab-rekam" title="Rekam Suara" class="md:hidden hidden z-40 right-4 bottom-20 h-16 w-16 bg-red-600 text-white rounded-full flex items-center justify-center shadow-lg hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2">
            <svg id="fab-rekam-icon" class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.49 6-3.31 6-6.72h-1.7z"></path></svg>
        </button>

        <button id="fab-pause" title="Jeda/Lanjut Rekam" class="md:hidden hidden z-40 right-24 bottom-20 h-14 w-14 bg-orange-500 text-white rounded-full flex items-center justify-center shadow-lg hover:bg-orange-600 focus:outline-none focus:ring-2 focus:ring-orange-400 focus:ring-offset-2">
            <svg id="fab-pause-icon" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"></path></svg>
            <svg id="fab-resume-icon" class="hidden w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
        </button>
    </div>
    
    <!-- Modals -->
    <div id="modal-pengaturan" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="glass-card rounded-lg shadow-xl p-6 w-full max-w-md">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-200">Pengaturan</h3>
            <div class="mt-4 space-y-4">
                <div>
                    <label for="voice-select" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Pilih Suara Pembaca:</label>
                    <select id="voice-select" class="w-full mt-1 p-2 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"></select>
                </div>
                <div class="flex items-center justify-between">
                     <label for="dark-mode-toggle" class="text-sm font-medium text-slate-700 dark:text-slate-300">Mode Gelap</label>
                     <button id="dark-mode-toggle" class="relative inline-flex items-center h-6 rounded-full w-11 transition-colors bg-slate-200 dark:bg-indigo-600">
                         <span class="inline-block w-4 h-4 transform bg-white rounded-full transition-transform translate-x-1 dark:translate-x-6"></span>
                     </button>
                </div>
            </div>
            <div class="mt-6 flex justify-end">
                <button id="tombol-tutup-pengaturan" class="px-4 py-2 bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-slate-200 rounded-lg hover:bg-slate-300 dark:hover:bg-slate-600">Tutup</button>
            </div>
        </div>
    </div>
     <div id="modal-hapus" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="glass-card rounded-lg shadow-xl p-6 w-full max-w-sm">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-200">Hapus Catatan?</h3>
            <p class="text-slate-600 dark:text-slate-400 mt-2">Apakah Anda yakin ingin menghapus catatan ini?</p>
            <div class="mt-6 flex justify-end gap-4">
                <button id="tombol-batal-hapus" class="px-4 py-2 bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-slate-200 rounded-lg hover:bg-slate-300 dark:hover:bg-slate-600">Batal</button>
                <button id="tombol-konfirmasi-hapus" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Ya, Hapus</button>
            </div>
        </div>
    </div>
    <div id="modal-gemini" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="glass-card rounded-lg shadow-xl p-6 w-full max-w-2xl max-h-[90vh] flex flex-col">

    <!-- Error Handler -->
    <script>
        // Global error handler
        window.addEventListener('error', (e) => {
            console.error('🚨 Global Error:', {
                message: e.message,
                source: e.filename,
                line: e.lineno,
                column: e.colno,
                error: e.error
            });
            
            // Show user-friendly error message
            const errorDiv = document.createElement('div');
            errorDiv.innerHTML = `
                <div class="error-notification">
                    <strong>⚠️ Error Detected</strong><br>
                    <small>${e.message}</small><br>
                    <button onclick="this.parentElement.parentElement.remove()" class="notification-close-btn">Tutup</button>
                </div>
            `;
            document.body.appendChild(errorDiv);
            
            // Auto remove after 10 seconds
            setTimeout(() => {
                if (errorDiv.parentElement) {
                    errorDiv.remove();
                }
            }, 10000);
        });
        
        // Unhandled promise rejection handler
        window.addEventListener('unhandledrejection', (e) => {
            console.error('🚨 Unhandled Promise Rejection:', e.reason);
            
            const errorDiv = document.createElement('div');
            errorDiv.innerHTML = `
                <div class="warning-notification">
                    <strong>⚠️ Connection Issue</strong><br>
                    <small>Ada masalah koneksi atau konfigurasi</small><br>
                    <button onclick="this.parentElement.parentElement.remove()" class="notification-close-btn">Tutup</button>
                </div>
            `;
            document.body.appendChild(errorDiv);
            
            setTimeout(() => {
                if (errorDiv.parentElement) {
                    errorDiv.remove();
                }
            }, 10000);
        });
        
        // Check if running on localhost
        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
            console.log('🔧 Development mode detected - debug tools available');
            console.log('💡 Run testFirebaseConnection() to diagnose connection issues');
            console.log('🔍 Run debugMonitor.getErrorReport() to see current status');
            
            // Show debug panel and test button in development
            const debugPanel = document.getElementById('debug-panel');
            const testConnectionBtn = document.getElementById('test-connection-btn');
            
            if (debugPanel) {
                debugPanel.classList.remove('hidden');
            }
            if (testConnectionBtn) {
                testConnectionBtn.classList.remove('hidden');
            }
        }
        
        // Global functions for development tools (defined early to prevent ReferenceError)
        // These are safe placeholder functions that will be replaced when app loads
        window.testFirebaseConnection = async function() {
            console.log('⚠️ Application loading... Please wait and try again.');
        };
        
        window.quickConnectivityTest = async function() {
            console.log('⚠️ Application loading... Please wait and try again.');
        };
        
        window.showDebugInfo = function() {
            console.log('⚠️ Application loading... Please wait and try again.');
        };
        
        window.showHelp = function() {
            console.log('❓ BLineNote Development Tools - Application still loading...');
        };
    </script>
